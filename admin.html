<!-- 文件5: admin.html (管理后台) 核心: 增删改产品/案例 -->
<!-- ********************************* -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 · 艾文普科技</title>
    <style> /* 复制完整样式 + 上面admin专用样式 */ </style>
    <style>
        .admin-section{ background: white; border-radius: 2rem; padding: 2rem; margin-bottom: 3rem; border: 1px solid #eef2f6; }
        .admin-form { background:#f8fafd; padding:1.8rem; border-radius:1.5rem; margin:1.8rem 0; display:flex; flex-direction:column; gap:1rem; border:1px solid #e2eaf2; }
        .admin-form input, .admin-form textarea { padding:0.8rem 1.2rem; border:1px solid #cfddee; border-radius:2rem; font-size:1rem; background:white; }
        .button-group { display:flex; gap:1rem; flex-wrap:wrap; }
        .btn-sm { padding:0.3rem 1rem; font-size:0.85rem; border-radius:2rem; border:none; background:#e9eef3; cursor:pointer; font-weight:500; }
        .btn-danger { background:#fde7e7; color:#a13131; } .btn-edit { background:#e7f0fd; color:#1d4d7c; }
        .admin-card-item { display:flex; align-items:center; gap:1.2rem; background:#f9fcff; padding:1rem 1.5rem; border-radius:2rem; margin-bottom:1rem; border:1px solid #e4ecf5; }
        .admin-card-preview { width:70px; height:70px; border-radius:1rem; object-fit:cover; background:#d0deeb; }
        .admin-card-info { flex:1; } .admin-card-actions { display:flex; gap:0.6rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <span class="logo">艾文普科技 · 管理</span>
            <div class="nav-links">
                <a href="index.html">主页</a><a href="products.html">产品</a><a href="cases.html">案例</a><a href="contact.html">联系</a><a href="admin.html" class="active">管理</a>
            </div>
        </div>
    </div>
    <div class="main-content">
        <h2 class="section-title">⚙️ 内容管理</h2>

        <!-- 产品管理区块 -->
        <div class="admin-section">
            <h3 style="font-size:1.8rem; margin-bottom:1rem;">📦 产品管理</h3>
            <div id="product-admin-list"></div>

            <div class="admin-form" id="productFormContainer">
                <h4 id="productFormTitle">添加新产品</h4>
                <input type="text" id="productId" placeholder="ID (自动生成)" readonly hidden>
                <input type="text" id="productTitle" placeholder="产品名称" required>
                <textarea id="productDesc" placeholder="简短描述"></textarea>
                <input type="text" id="productImage" placeholder="图片URL (例如 https://picsum.photos/400/250?random=1)">
                <div class="button-group">
                    <button class="btn btn-primary" id="saveProductBtn">保存产品</button>
                    <button class="btn" id="cancelProductEdit">取消</button>
                </div>
            </div>
        </div>

        <!-- 案例管理区块 -->
        <div class="admin-section">
            <h3 style="font-size:1.8rem; margin-bottom:1rem;">📁 案例管理</h3>
            <div id="case-admin-list"></div>
            <div class="admin-form" id="caseFormContainer">
                <h4 id="caseFormTitle">添加新案例</h4>
                <input type="text" id="caseId" placeholder="ID" readonly hidden>
                <input type="text" id="caseTitle" placeholder="案例名称">
                <textarea id="caseDesc" placeholder="案例描述"></textarea>
                <input type="text" id="caseImage" placeholder="图片URL">
                <div class="button-group">
                    <button class="btn btn-primary" id="saveCaseBtn">保存案例</button>
                    <button class="btn" id="cancelCaseEdit">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 初始化默认数据 (若空)
            if (!localStorage.getItem('products')) {
                localStorage.setItem('products', JSON.stringify([
                    { id: Date.now()+1, title: '智联平台', description: '企业级物联网中台', imageUrl: 'https://picsum.photos/id/20/400/250' },
                    { id: Date.now()+2, title: '明析BI', description: '轻量级数据分析', imageUrl: 'https://picsum.photos/id/21/400/250' }
                ]));
            }
            if (!localStorage.getItem('cases')) {
                localStorage.setItem('cases', JSON.stringify([
                    { id: Date.now()+3, title: '某制造集团', description: '预测性维护', imageUrl: 'https://picsum.photos/id/15/400/250' }
                ]));
            }

            // 通用渲染函数
            function renderProducts() {
                const products = JSON.parse(localStorage.getItem('products')) || [];
                const container = document.getElementById('product-admin-list');
                container.innerHTML = products.map(p => `
                    <div class="admin-card-item" data-id="${p.id}">
                        <img src="${p.imageUrl}" class="admin-card-preview" onerror="this.src='https://picsum.photos/70/70'">
                        <div class="admin-card-info">
                            <strong>${p.title}</strong><br><small>${p.description.substring(0,40)}</small>
                        </div>
                        <div class="admin-card-actions">
                            <button class="btn-sm btn-edit" onclick="editProduct('${p.id}')">编辑</button>
                            <button class="btn-sm btn-danger" onclick="deleteProduct('${p.id}')">删除</button>
                        </div>
                    </div>
                `).join('');
            }
            function renderCases() {
                const cases = JSON.parse(localStorage.getItem('cases')) || [];
                const container = document.getElementById('case-admin-list');
                container.innerHTML = cases.map(c => `
                    <div class="admin-card-item" data-id="${c.id}">
                        <img src="${c.imageUrl}" class="admin-card-preview" onerror="this.src='https://picsum.photos/70/70'">
                        <div class="admin-card-info">
                            <strong>${c.title}</strong><br><small>${c.description.substring(0,40)}</small>
                        </div>
                        <div class="admin-card-actions">
                            <button class="btn-sm btn-edit" onclick="editCase('${c.id}')">编辑</button>
                            <button class="btn-sm btn-danger" onclick="deleteCase('${c.id}')">删除</button>
                        </div>
                    </div>
                `).join('');
            }

            // 产品增删改逻辑
            window.deleteProduct = (id) => {
                let products = JSON.parse(localStorage.getItem('products')) || [];
                products = products.filter(p => p.id != id);
                localStorage.setItem('products', JSON.stringify(products));
                renderProducts();
            };
            window.editProduct = (id) => {
                const products = JSON.parse(localStorage.getItem('products')) || [];
                const product = products.find(p => p.id == id);
                if (product) {
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productTitle').value = product.title;
                    document.getElementById('productDesc').value = product.description;
                    document.getElementById('productImage').value = product.imageUrl;
                    document.getElementById('productFormTitle').innerText = '编辑产品';
                }
            };
            document.getElementById('saveProductBtn').addEventListener('click', () => {
                const id = document.getElementById('productId').value;
                const title = document.getElementById('productTitle').value.trim();
                const desc = document.getElementById('productDesc').value.trim();
                const img = document.getElementById('productImage').value.trim();
                if (!title || !desc || !img) return alert('请填写完整');
                let products = JSON.parse(localStorage.getItem('products')) || [];
                if (id) { // 更新
                    products = products.map(p => p.id == id ? { ...p, title, description: desc, imageUrl: img } : p);
                } else { // 新增
                    const newId = Date.now();
                    products.push({ id: newId, title, description: desc, imageUrl: img });
                }
                localStorage.setItem('products', JSON.stringify(products));
                // 重置表单
                document.getElementById('productId').value = '';
                document.getElementById('productTitle').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productImage').value = '';
                document.getElementById('productFormTitle').innerText = '添加新产品';
                renderProducts();
            });
            document.getElementById('cancelProductEdit').addEventListener('click', ()=>{
                document.getElementById('productId').value = '';
                document.getElementById('productTitle').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productImage').value = '';
                document.getElementById('productFormTitle').innerText = '添加新产品';
            });

            // 案例类似
            window.deleteCase = (id) => {
                let cases = JSON.parse(localStorage.getItem('cases')) || [];
                cases = cases.filter(c => c.id != id);
                localStorage.setItem('cases', JSON.stringify(cases));
                renderCases();
            };
            window.editCase = (id) => {
                const cases = JSON.parse(localStorage.getItem('cases')) || [];
                const caseItem = cases.find(c => c.id == id);
                if (caseItem) {
                    document.getElementById('caseId').value = caseItem.id;
                    document.getElementById('caseTitle').value = caseItem.title;
                    document.getElementById('caseDesc').value = caseItem.description;
                    document.getElementById('caseImage').value = caseItem.imageUrl;
                    document.getElementById('caseFormTitle').innerText = '编辑案例';
                }
            };
            document.getElementById('saveCaseBtn').addEventListener('click', ()=>{
                const id = document.getElementById('caseId').value;
                const title = document.getElementById('caseTitle').value.trim();
                const desc = document.getElementById('caseDesc').value.trim();
                const img = document.getElementById('caseImage').value.trim();
                if (!title || !desc || !img) return alert('请填写完整');
                let cases = JSON.parse(localStorage.getItem('cases')) || [];
                if (id) {
                    cases = cases.map(c => c.id == id ? { ...c, title, description: desc, imageUrl: img } : c);
                } else {
                    cases.push({ id: Date.now(), title, description: desc, imageUrl: img });
                }
                localStorage.setItem('cases', JSON.stringify(cases));
                document.getElementById('caseId').value = ''; document.getElementById('caseTitle').value = ''; document.getElementById('caseDesc').value = ''; document.getElementById('caseImage').value = '';
                document.getElementById('caseFormTitle').innerText = '添加新案例';
                renderCases();
            });
            document.getElementById('cancelCaseEdit').addEventListener('click', ()=>{
                document.getElementById('caseId').value = ''; document.getElementById('caseTitle').value = ''; document.getElementById('caseDesc').value = ''; document.getElementById('caseImage').value = '';
                document.getElementById('caseFormTitle').innerText = '添加新案例';
            });

            // 初始渲染
            renderProducts();
            renderCases();
        })();
    </script>
</body>
</html>
